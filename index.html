<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Welcome to the world of HTML</h1>
    <h2>Subheading</h2>
    <h3>Section Title</h3>
    <p>This is a paragraph explaining HTML tags.</p>
    
    <!-- Inline Text (span)
The <span> tag is used for inline styling or grouping text within a larger element. -->
    <p>This is a <span style="color: red">red</span> word.</p>

    <!-- Unordered List -->
    <ul>
      <li>HTML</li>
      <li>CSS</li>
      <li>JavaScript</li>
    </ul>

    <!-- Ordered list -->
    <ol>
      <li>First Step</li>
      <li>Second Step</li>
      <li>Third Step</li>
    </ol>
  </body>
</html>
